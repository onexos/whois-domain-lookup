name: Update public-suffix-list.dat and rdap-servers-iana.json

on:
  schedule:
    - cron: "33 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download files
        run: |
          curl -fsSL "https://publicsuffix.org/list/public_suffix_list.dat" -o src/data/public-suffix-list.dat
          curl -fsSL "https://data.iana.org/rdap/dns.json" -o src/data/rdap-servers-iana.json

      - name: Detect changes
        id: changes
        run: |
          git add -N src/data/public-suffix-list.dat src/data/rdap-servers-iana.json

          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request (fork only)
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update public suffix list and rdap servers"
          title: "Update public suffix list and RDAP servers"
          body: |
            Automated update inside fork repo.

            - public-suffix-list.dat
            - rdap-servers-iana.json

          branch: auto/update-data
          base: main
          delete-branch: true

          labels: |
            automated
